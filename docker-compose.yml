services:
  postgres:
    image: postgres:16-alpine
    container_name: rikuchik_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rikuchik
      POSTGRES_USER: rikuchik
      POSTGRES_PASSWORD: rikuchik_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rikuchik -d rikuchik"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
